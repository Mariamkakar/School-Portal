<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Courses</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <h2>Bright Future School</h2>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="profile.html">Profile</a></li>
        <li><a href="courses.html">Courses</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>

    <div class="container">
      <h1>Available Courses</h1>

      <div class="filter-buttons">
        <button class="filter" data-grade="all">All</button>
        <button class="filter" data-grade="10">Grade 10</button>
        <button class="filter" data-grade="11">Grade 11</button>
      </div>

      <div id="courseContainer"></div>

      <div id="courseDetails"></div>

      <h2>Add New Course</h2>

      <form id="courseForm">
        <input type="text" id="courseName" placeholder="Course Name" />
        <input type="text" id="instructor" placeholder="Instructor" />
        <input type="text" id="courseGrade" placeholder="Grade Level" />
        <input type="text" id="description" placeholder="Description" />
        <input type="text" id="image" placeholder="Image URL" />

        <button type="submit">Add Course</button>
      </form>
    </div>

    <script src="script.js"></script>
  </body>
</html>
